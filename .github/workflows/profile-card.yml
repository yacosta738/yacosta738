name: Update Profile Card

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

concurrency:
  group: profile-card-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-profile-card:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: cache/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r cache/requirements.txt

      - name: Test profile card generator
        run: python -m pytest -q

      - name: Update profile card SVGs
        env:
          METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
          USER_NAME: yacosta738
        run: python scripts/profile_card.py

      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/profile-card-dark.svg assets/profile-card-light.svg cache/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update profile card stats"
            git push
          fi
