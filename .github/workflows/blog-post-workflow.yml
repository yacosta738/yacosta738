name: Latest blog post workflow

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    name: Update this repo's README with latest blog posts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: gautamkrishnar/blog-post-workflow@ebbf1911bcb30845eead5504d0b885f6582f65a0 # v1.9.5
        with:
          max_post_count: "6"
          feed_list: "https://blog.yunielacosta.com/en/rss.xml"
