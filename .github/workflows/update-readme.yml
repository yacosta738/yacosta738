name: Update Profile Readme

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:

concurrency:
  group: update-profile-readme
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Calculate years of experience
        id: calc-experience
        run: |
          start_year=2017
          start_month=9
          current_year=$(date +'%Y')
          current_month=$(date +'%m')
          if [ "$current_month" -ge "$start_month" ]; then
            experience=$((current_year - start_year))
          else
            experience=$((current_year - start_year - 1))
          fi
          echo "experience=$experience" >> "$GITHUB_OUTPUT"

      - name: Update README
        run: |
          experience=${{ steps.calc-experience.outputs.experience }}
          sed -i "s/With over [0-9]\+ years of experience/With over $experience years of experience/" README.md

      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update years of experience"
            git push
          fi
